name: CD

on:
  push:
    branches: [master]

jobs:
  push-to-dockerhub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: herberthchavez19
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./EjercicioEvaluado03_PNC
          push: true
          tags: |
            herberthchavez19/ejercicio03-pnc:latest
            herberthchavez19/ejercicio03-pnc:${{ github.sha }}
