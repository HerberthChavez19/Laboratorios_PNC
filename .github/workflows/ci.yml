name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Mockito unit tests
        run: mvn test -f EjercicioEvaluado03_PNC/pom.xml

      - name: Build JAR
        run: mvn package -DskipTests -f EjercicioEvaluado03_PNC/pom.xml

      - name: Create .env for smoke test
        run: |
          cat > EjercicioEvaluado03_PNC/.env <<EOF
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          EOF

      - name: Start containers
        run: docker compose -f EjercicioEvaluado03_PNC/docker-compose.yml up -d --build

      - name: Smoke test — wait for /actuator/health
        run: |
          echo "Waiting for application to start..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "Application is healthy!"
              exit 0
            fi
            echo "Attempt $i/24 — retrying in 5s..."
            sleep 5
          done
          echo "Application did not respond after 2 minutes"
          docker compose -f EjercicioEvaluado03_PNC/docker-compose.yml logs
          exit 1

      - name: Tear down containers
        if: always()
        run: docker compose -f EjercicioEvaluado03_PNC/docker-compose.yml down -v
